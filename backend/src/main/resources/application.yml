spring:
  application:
    name: uzproc-backend
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:uzproc}?stringtype=unspecified&characterEncoding=UTF-8&useUnicode=true
    username: ${DB_USER:uzproc_user}
    password: ${DB_PASSWORD:uzproc_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # Диагностика незакрытых соединений: WARN, если соединение занято дольше 20с
      leak-detection-threshold: 20000
      # Страховка от повисших full-scan запросов дашбордов (server-side statement_timeout, мс)
      data-source-properties:
        options: "-c statement_timeout=30000"
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:true}
    # Освобождать соединение на границе транзакции, не держать Hibernate-сессию до конца сериализации ответа
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Форматирование/комментарии SQL нужны только при включённом SQL-логировании (dev); в prod — off
        format_sql: ${SQL_FORMAT:false}
        use_sql_comments: ${SQL_COMMENTS:false}
        # Батч-загрузка LAZY-связей и коллекций пачками — глобально гасит N+1 (грузит через IN (...))
        default_batch_fetch_size: 100
        # Группировка INSERT/UPDATE в JDBC-батчи (ускоряет массовые импорты, напр. согласования договоров)
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        connection:
          characterEncoding: UTF-8
          useUnicode: true
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    repair-on-migrate: true
  
  # Увеличиваем лимиты для multipart загрузки
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
      file-size-threshold: 2KB

  # Настройки почты (IMAP/POP3 и SMTP - mail.uzumteam.uz; порты 993/587; IMAP SSL, SMTP TLS)
  mail:
    host: ${MAIL_HOST:mail.uzumteam.uz}
    port: ${MAIL_SMTP_PORT:587}
    username: ${MAIL_USERNAME:uzproc@uzumteam.uz}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 20000
          timeout: 20000
          writetimeout: 20000
          ssl:
            trust: ${MAIL_SSL_TRUST:mail.uzumteam.uz}
            enable: false
            # Явный протокол TLS (часто нужен для корпоративных серверов)
            protocols: ${MAIL_SMTP_SSL_PROTOCOLS:TLSv1.2}
            # Если Outlook подключается, а приложение нет — часто из‑за проверки имени в сертификате (внутренний/self-signed)
            checkserveridentity: ${MAIL_SSL_CHECKSERVERIDENTITY:false}
          debug: ${MAIL_DEBUG:false}
        imap:
          port: ${MAIL_IMAP_PORT:993}
          ssl:
            enable: true
            trust: ${MAIL_SSL_TRUST:mail.uzumteam.uz}
            protocols: ${MAIL_IMAP_SSL_PROTOCOLS:TLSv1.2}
            checkserveridentity: ${MAIL_SSL_CHECKSERVERIDENTITY:false}
        store:
          protocol: imap

server:
  port: 8080
  servlet:
    context-path: /api
  # Увеличиваем лимиты для загрузки больших файлов
  max-http-header-size: 64KB
  tomcat:
    max-swallow-size: 50MB
    connection-timeout: 60000

# Настройки фронтенда
# Базовый URL определяется автоматически в зависимости от окружения:
# - Если FRONTEND_BASE_URL установлена - используется она
# - В Docker/production - определяется автоматически (uzproc.uzum.io)
# - Локально - используется localhost:3000
# Ссылка CSI в письме (оценка) всегда ведёт на сервер деплоя (по умолчанию 10.123.48.62).
security:
  jwt:
    # Секрет ОБЯЗАТЕЛЬНО задаётся через переменную окружения JWT_SECRET.
    # Дефолта НЕТ намеренно (fail-fast): без JWT_SECRET приложение не стартует,
    # чтобы на проде токены не подписывались публично известным ключом.
    # Для локальной разработки дефолт задан в application-local.yml.
    # Минимум 32 символа для HS256.
    secret: ${JWT_SECRET}
    expiration: 86400  # 24 часа в секундах
  auth:
    # false только для local-профиля (локальная разработка)
    enabled: true

app:
  frontend:
    base-url: ${FRONTEND_BASE_URL:}
    csi-link-base-url: ${CSI_LINK_BASE_URL:http://10.123.48.62}
  # Вкладка ЕК (Обзор): перевод сумм в базовую валюту по курсу при разных валютах
  overview:
    ek:
      base-currency: RUB
      exchange-rates:
        RUB: 1
        RUR: 1
        USD: 100
        EUR: 105

management:
  endpoints:
    web:
      exposure:
        # Наружу публикуем только health. info/metrics раскрывали версию JVM,
        # внутренние хосты и топологию для прицельных атак (T3 fix, CWE-200)
        include: health
  endpoint:
    health:
      # Детали health (БД, диск, mail-хост) — только аутентифицированным; анонимам — статус (T3 fix)
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.uzproc: INFO
    org.springframework.web: INFO
    # SQL-логирование выключено в prod; включается в application-local.yml (dev).
    # 'OFF' в кавычках — иначе YAML трактует как boolean false.
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: "OFF"
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
