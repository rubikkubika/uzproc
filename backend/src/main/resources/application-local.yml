# Локальная разработка: аутентификация отключена
# В production (Docker) эта настройка НЕ используется
security:
  auth:
    enabled: false

# Dev: подробное SQL-логирование и форматирование (в prod выключено в application.yml)
spring:
  jpa:
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

logging:
  level:
    com.uzproc: DEBUG
    org.hibernate.SQL: DEBUG
    # Hibernate 6: логгер значений bind-параметров (замена устаревшего BasicBinder)
    org.hibernate.orm.jdbc.bind: TRACE
